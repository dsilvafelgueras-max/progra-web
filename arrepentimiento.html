<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulario de arrepentimiento de compra de SANGRIA."
    />
    <title>Arrepentimiento | SANGRIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Inter:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="contact-page">
    <main class="contact-shell">
      <section class="contact-page-card regret-page-card">
        <a class="brand contact-brand" href="./index.html">SANGRIA</a>
        <div class="contact-copy regret-copy">
          <p class="section-tag">Arrepentimiento</p>
          <h1>Cancelar compra</h1>
          <p>
            Si te arrepentiste de una compra, podes pedir la cancelacion enviando
            este formulario <strong>con tu numero de orden</strong>. Tenes como
            maximo hasta 10 dias corridos desde que recibiste el producto.
          </p>
        </div>

        <form class="contact-form contact-form-page regret-form">
          <label>
            <span>Nombre</span>
            <input type="text" placeholder="ej.: Maria Perez" />
          </label>
          <label>
            <span>Email</span>
            <input type="email" placeholder="ej.: tuemail@email.com" />
          </label>
          <label>
            <span>Telefono</span>
            <input type="tel" placeholder="ej.: 1123445567" />
          </label>
          <label>
            <span>Numero de orden</span>
            <input type="text" placeholder="ej.: SG-1024" />
          </label>
          <label class="full-row">
            <span>Mensaje</span>
            <textarea rows="7" placeholder="ej.: Tu mensaje"></textarea>
          </label>
          <button class="primary-button full-width" type="button">Enviar solicitud</button>
        </form>
      </section>
    </main>
  </body>
</html>
