<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mi cuenta SANGRIA." />
    <title>Mi Cuenta | SANGRIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Inter:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="cuenta-page">
    <nav class="topbar" style="position:relative;z-index:2;padding:1.2rem 2rem;">
      <div class="topbar-left">
        <a class="brand" href="./index.html">SANGRIA</a>
      </div>
      <div class="topbar-right">
        <button class="ghost-button compact" type="button" id="logout-btn">Cerrar sesion</button>
      </div>
    </nav>

    <main class="section" style="padding-top:3rem;padding-bottom:4rem;">
      <div class="cuenta-header">
        <p class="section-tag">Mi cuenta</p>
        <h1 id="cuenta-email"></h1>
      </div>

      <div class="cuenta-grid">
        <section class="cuenta-block">
          <h2>Favoritos</h2>
          <div id="favorites-list" class="cuenta-items"></div>
        </section>

        <section class="cuenta-block">
          <h2>Historial de compras</h2>
          <div id="orders-list" class="cuenta-items"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer shop-footer"><div class="footer-columns"><div><h2>ayuda</h2><a href="./contacto.html">contactanos</a><a href="./contacto.html">cambios y devoluciones</a><a href="./guia-talles.html">guia de talles</a><a href="./cuidados.html">cuidados</a></div><div><h2>legal</h2><a class="regret-button footer-regret-inline" href="./arrepentimiento.html">Boton de arrepentimiento</a></div><div><h2>siguenos</h2><div class="social-row"><a href="https://www.instagram.com/sangriajewelry/" aria-label="Instagram" target="_blank" rel="noreferrer"><img src="./assets/instagram-logo-instagram-logo-transparent-instagram-icon-transparent-free-free-png.webp" alt="Instagram" class="social-logo-img" /></a><a href="https://www.tiktok.com/@lolisilvafelgue" aria-label="TikTok" target="_blank" rel="noreferrer"><img src="./assets/tiktok-logo-tikok-icon-transparent-tikok-app-logo-free-png.webp" alt="TikTok" class="social-logo-img" /></a></div></div></div><div class="footer-bottom"><div class="payment-block" aria-label="Medios de pago"><strong>Medios de pago</strong><div class="payment-row"><img class="payment-logo-img" src="./assets/payments/mercado-pago.webp" alt="Mercado Pago" /><img class="payment-logo-img" src="./assets/payments/apple-pay.png" alt="Apple Pay" /><img class="payment-logo-img" src="./assets/payments/visa.png" alt="Visa" /><img class="payment-logo-img" src="./assets/payments/mastercard.svg" alt="Mastercard" /><img class="payment-logo-img" src="./assets/payments/amex.svg" alt="American Express" /><img class="payment-logo-img" src="./assets/payments/naranja.png" alt="Naranja" /></div></div></div><p class="footer-signature">SANGRIA</p></footer>

    <script type="module">
      import { products } from "./js/data.js";

      const SESSION_KEY = "sangria-session";
      const USERS_KEY = "sangria-users";
      const FAVORITES_KEY = "sangria-favorites";

      const session = JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
      if (!session) window.location.href = "./login.html";

      document.getElementById("cuenta-email").textContent = session.email;

      document.getElementById("logout-btn").addEventListener("click", () => {
        localStorage.removeItem(SESSION_KEY);
        window.location.href = "./login.html";
      });

      const favoriteIds = JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
      const favoriteProducts = products.filter(p => favoriteIds.includes(p.id));
      const favList = document.getElementById("favorites-list");

      if (favoriteProducts.length === 0) {
        favList.innerHTML = `<p class="empty-state-inline">Todavia no guardaste favoritos. Toca el corazon en un producto para guardarlo.</p>`;
      } else {
        favList.innerHTML = favoriteProducts.map(p => `
          <div class="cuenta-item">
            <img src="${p.image}" alt="${p.name}" />
            <div>
              <strong>${p.name}</strong>
              <span>${p.priceLabel}</span>
            </div>
            <a class="ghost-button compact" href="./producto.html?id=${p.id}">Ver</a>
          </div>
        `).join("");
      }

      const users = JSON.parse(localStorage.getItem(USERS_KEY) || "{}");
      const user = users[session.email];
      const orders = user?.orders ?? [];
      const ordersList = document.getElementById("orders-list");

      if (orders.length === 0) {
        ordersList.innerHTML = `<p class="empty-state-inline">Todavia no realizaste compras.</p>`;
      } else {
        ordersList.innerHTML = orders.map(order => `
          <div class="cuenta-item">
            <div>
              <strong>${order.date}</strong>
              <span>${order.items.map(i => i.name).join(", ")}</span>
            </div>
            <strong>${order.total}</strong>
          </div>
        `).join("");
      }
    </script>
  </body>
</html>
