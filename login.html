<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Iniciar sesion en SANGRIA." />
    <title>Iniciar Sesion | SANGRIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Inter:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <a class="brand login-brand" href="./index.html">SANGRIA</a>
        <div class="login-copy">
          <p class="section-tag">Cuenta</p>
          <h1>Iniciar sesion</h1>
          <p>Ingresa con tu correo para guardar favoritos, compras y seguimiento.</p>
        </div>

        <form class="login-form">
          <button class="primary-button full-width" type="button">Continuar con Shop</button>
          <div class="login-divider">
            <span></span>
            <strong>o</strong>
            <span></span>
          </div>
          <label>
            <span>Correo electronico</span>
            <input type="email" placeholder="tu@email.com" />
          </label>
          <button class="primary-button full-width" type="button">Continuar</button>
          <label class="login-check">
            <input type="checkbox" checked />
            <span>Enviarme novedades y ofertas por correo electronico</span>
          </label>
        </form>

        <p class="login-note">
          Si continuas, aceptas nuestros Terminos del servicio.
        </p>
      </section>
    </main>
  </body>
</html>
