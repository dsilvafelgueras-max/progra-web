<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contacto SANGRIA para consultas y diseno personalizado."
    />
    <title>Contacto | SANGRIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Inter:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="contact-page">
    <main class="contact-shell">
      <section class="contact-page-card">
        <a class="brand contact-brand" href="./index.html">SANGRIA</a>
        <div class="contact-copy">
          <p class="section-tag">Contacto</p>
          <h1>Consulta personalizada</h1>
          <p>
            Escribinos por talle, stock, envios o una pieza hecha a medida.
          </p>
        </div>

        <form class="contact-form contact-form-page">
          <label>
            <span>Nombre</span>
            <input type="text" placeholder="Tu nombre" />
          </label>
          <label>
            <span>Email</span>
            <input type="email" placeholder="tu@email.com" />
          </label>
          <label class="full-row">
            <span>Mensaje</span>
            <textarea rows="6" placeholder="Contanos que pieza te interesa"></textarea>
          </label>
          <button class="primary-button full-width" type="button">
            Enviar consulta
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
